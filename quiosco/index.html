<head>

  <title>MetsuOS - Quiosco</title>
  <style>
    :root {
      --sky-color-1: #87CEEB;
      --sky-color-2: #E0F6FF;
      --dusk-color-1: #ff7e5f;
      --dusk-color-2: #feb47b;
      --dusk-color-3: #4a2c6e;
      --night-color-1: #0a001f;
      --night-color-2: #1a0033;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Courier New', monospace;
      color: #e0d0b0;
      min-height: 100vh;
      background: #0f0c08;
      overflow-x: hidden;
    }

    .scene {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4vw 2vw;
      transition: background 1.2s ease;
      overflow: hidden;
    }

   /* CIELO ESTRELLADO DENSO */
.scene::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    radial-gradient(1px 1px at 10% 20%, #fff, transparent),
    radial-gradient(1px 1px at 30% 50%, #fff, transparent),
    radial-gradient(1px 1px at 50% 80%, #fff, transparent),
    radial-gradient(1px 1px at 80% 10%, #fff, transparent),
    radial-gradient(2px 2px at 15% 75%, #ffffff88, transparent),
    radial-gradient(2px 2px at 65% 45%, #ffffffaa, transparent),
    radial-gradient(1px 1px at 90% 90%, #fff, transparent),
    radial-gradient(1.5px 1.5px at 40% 15%, #fff, transparent);
  background-size: 15% 15%;
  background-repeat: repeat;
  opacity: 0; 
  transition: opacity 3s ease;
  pointer-events: none;
  z-index: 1;
  mask-image: radial-gradient(circle at center, black 60%, transparent 100%);
}

body.night .scene::before { 
  opacity: 0.8; 
}

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    .ground {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: 35vh;
      background: linear-gradient(to bottom, #555 0%, #333 100%);
      z-index: 4;
      transition: background 4s ease, box-shadow 4s ease;
    }

    body.day   .ground { background: linear-gradient(to bottom, #777 0%, #555 100%); }
    body.dusk  .ground { background: linear-gradient(to bottom, #666 0%, #444 100%); }
    body.night .ground { background: linear-gradient(to bottom, #222 0%, #111 100%); }

    .celestial {
      position: absolute;
      width: 8vw;
      height: 8vw;
      min-width: 60px;
      min-height: 60px;
      border-radius: 50%;
      transition: all 4s ease;
      z-index: 2;
      pointer-events: none;
    }

    .sun {
      background: radial-gradient(circle at 30% 30%, #fff 10%, #ffeb3b 40%, #ffb300 80%, transparent 100%);
      box-shadow: 0 0 60px #ffeb3b, 0 0 120px #ffb300;
    }

    .moon {
      background: radial-gradient(circle at 30% 30%, #f0f8ff 5%, #c0d0e8 35%, #8090b0 70%, #405080 100%);
      box-shadow: 0 0 50px #a0c0ff, 0 0 100px #6080ff, inset 0 0 30px #ffffff40;
    }

    .lamp {
      position: absolute;
      bottom: 35vh;
      width: 3.5vw;
      min-width: 24px;
      height: 38vh;
      background: linear-gradient(#444 0%, #222 40%, #111 100%);
      border-radius: 1.8vw 1.8vw 0 0;
      box-shadow: inset 0 2vh 4vh rgba(0,0,0,0.7), 0 0.4vh 1vh rgba(0,0,0,0.5);
      z-index: 4;
      cursor: pointer;
      transition: all 3s ease;
    }

    .lamp.left  { left: 18%; }
    .lamp.right { right: 18%; }

    .lamp::after {
      content: '';
      position: absolute;
      bottom: -1.5vh;
      left: 50%;
      transform: translateX(-50%);
      width: 180%;
      height: 1.8vh;
      background: #555;
      border-radius: 50%;
      box-shadow: 0 0.3vh 0.8vh #0006;
    }

    .lamp::before {
      content: '';
      position: absolute;
      top: -7vh;
      left: 50%;
      transform: translateX(-50%);
      width: 7vw;
      height: 5vh;
      min-width: 45px;
      background: radial-gradient(circle at 50% 30%, #fffacd 8%, #ffeb3b 20%, transparent 70%),
                  radial-gradient(circle at 50% 70%, #ffb74d 10%, transparent 60%);
      border-radius: 60% 60% 40% 40%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2.5s ease;
      box-shadow: 0 0 40px #ffeb3b, 0 0 80px #ffb300, 0 0 140px #ff9800;
    }

    body.night .lamp::before { opacity: 0.9; }
    body.dusk  .lamp::before { opacity: 0.5; box-shadow: 0 0 30px #ff9800, 0 0 70px #ff5722; }

.clock {
  position: absolute;
  top: -14rem;
  left: 48%;
  transform: translateX(-50%);
  width: 4vw;
  height: 4vw;
  min-width: 70px;
  min-height: 70px;
  background: #e8d5b5;
  border: 4px solid #8a6a40;
  border-radius: 50%;
  box-shadow: inset 0 0 12px rgba(0,0,0,0.4), 0 0 10px rgba(0,0,0,0.5);
  z-index: 14;
  position: relative;           /* importante para posicionar pseudo-elementos */
  overflow: hidden;
}

.clock::before, .clock::after {
  content: '';
  position: absolute;
  left: 50%;
  bottom: 50%;
  transform-origin: bottom center;
  border-radius: 2px;
  transition: transform 0.8s ease-out;
}

.clock::before {                  /* AGUJA DE MINUTOS: larga y fina, color oscuro o negro */
  width: 3px;                     /* más fina que la de horas */
  height: 38%;                    /* más larga */
  background: #222;               /* o #111 para más contraste */
  transform: translateX(-50%) rotate(var(--minute-hand, 0deg));
}

.clock::after {                   /* AGUJA DE HORAS: más corta y gruesa, roja o dorada */
  width: 5px;                     /* más gruesa */
  height: 24%;                    /* más corta */
  background: #c44;               /* rojo clásico o puedes cambiar a #8a6a40 para dorado vintage */
  transform: translateX(-50%) rotate(var(--hour-hand, 0deg));
  transition: transform 1.4s ease-out;  /* un poco más lento para que se note la diferencia */
}

    .kiosk { width: min(1100px, 95vw); aspect-ratio: 4 / 3; max-width: 100%; position: relative; background: linear-gradient(135deg, #3a2a1a 0%, #2a1a0f 40%, #1f140a 100%); border: clamp(10px, 1.8vw, 18px) solid #1a0f06; border-radius: 18px; box-shadow: 0 6vw 12vw rgba(0,0,0,0.95), inset 0 3vw 8vw rgba(255,200,100,0.08), inset 0 -3vw 6vw rgba(0,0,0,0.7); overflow: hidden; perspective: 2200px; perspective-origin: 50% 30%; z-index: 10; }
    .roof { position: absolute; top: -3vw; left: 50%; transform: translateX(-50%); width: 112%; height: clamp(60px, 9vw, 90px); background: linear-gradient(to bottom, #5a4028, #3a2818); border-radius: 50% 50% 0 0 / 100% 100% 0 0; box-shadow: 0 1.2vw 3.5vw rgba(0,0,0,0.85); z-index: 11; }
    .front-glass { position: absolute; inset: 8% 6% 12% 6%; background: linear-gradient(135deg, rgba(220,220,240,0.10), rgba(180,180,220,0.06)); border: 2px solid rgba(100,80,50,0.5); border-radius: 8px; box-shadow: inset 0 0 4.5vw rgba(255,255,255,0.12), 0 0 3.5vw rgba(0,0,0,0.55); backdrop-filter: blur(1.5px); z-index: 12; pointer-events: none; }

    .shelf { position: absolute; height: 0.3vw; min-height: 3px; background: linear-gradient(to right, #4a3420, #6a5030, #4a3420); box-shadow: 0 0.5vw 1.5vw rgba(0,0,0,0.75); z-index: 14; }
    .shelf-top    { top: 12%; left: 10%; right: 10%; }
    .shelf-middle { top: 32%; left: 10%; right: 10%; }
    .shelf-lower  { top: 52%; left: 10%; right: 10%; height:4% }
    .kioskero-area { position: absolute; top: 50%; left: 32%; transform: translate(-50%, -50%); width: clamp(100px, 13vw, 140px); height: clamp(170px, 26vw); z-index: 15; }
    .kioskero { position: relative; width: 100%; height: 100%; transform: scale(1); }
    .kioskero .head { position: absolute; top: 0; left: 50%; width: 72px; height: 72px; background: #f4c9a0; border-radius: 50% 50% 45% 45%; transform: translateX(-50%); box-shadow: inset 0 8px 12px rgba(0,0,0,0.3); }
    .kioskero .head::before { content: ''; position: absolute; top: 18px; left: 50%; width: 18px; height: 18px; background: #222; border-radius: 50%; transform: translateX(-50%); box-shadow: 20px 0 #222, -20px 0 #222; }
    .kioskero .head::after { content: ''; position: absolute; bottom: 20px; left: 50%; width: 28px; height: 8px; background: #c44; border-radius: 50%; transform: translateX(-50%); }
    .kioskero .body { position: absolute; top: 68px; left: 50%; width: 88px; height: 92px; background: linear-gradient(#3a5a9a, #2a4a8a); transform: translateX(-50%); border-radius: 12px 12px 8px 8px; box-shadow: inset 0 10px 20px rgba(255,255,255,0.2); }
    .kioskero .arm-left, .kioskero .arm-right { position: absolute; top: 78px; width: 24px; height: 62px; background: #f4c9a0; border-radius: 40px; }
    .kioskero .arm-left { left: 14%; transform: rotate(-28deg); }
    .kioskero .arm-right { right: 14%; transform: rotate(28deg); }
    .kioskero .leg-left, .kioskero .leg-right { position: absolute; bottom: 0; width: 26px; height: 58px; background: #1a2a4a; }
    .kioskero .leg-left { left: 32%; transform: rotate(12deg); }
    .kioskero .leg-right { right: 32%; transform: rotate(-12deg); }
    .kioskero-mario .head { background: #e8b080; }
    .kioskero-mario .head::before { background: #c00; width: 58px; height: 22px; top: -8px; border-radius: 12px 12px 0 0; box-shadow: none; }
    .kioskero-mario .body { background: #c00; }
    .kioskero-mario .arm-left, .kioskero-mario .arm-right { background: #2a4a8a; }
    .golosinas { position: absolute; inset: 10% 12% 10% 12%; display: flex; flex-wrap: wrap; justify-content: space-around; align-content: center; gap: 1.5vw; z-index: 13; pointer-events: none; }
    .jar, .pipas, .chicle { width: clamp(32px, 5vw, 42px); height: clamp(50px, 8vw, 68px); flex: 0 0 auto; border-radius: 8px; border: 3px solid #8a6a40; box-shadow: inset 0 4px 8px #0004, 0 2px 6px #0006; }
    .jar   { background: linear-gradient(#ffeb3b, #fbc02d); }
    .pipas { background: linear-gradient(#8d6e63, #6d4c41); height: clamp(40px, 6.5vw, 52px); }
    .chicle { background: linear-gradient(#e91e63, #c2185b); height: clamp(20px, 3vw, 28px); width: clamp(40px, 6vw, 55px); }
    .magazines { position: absolute; inset: 0; z-index: 15; }
    .magazine { position: absolute; width: clamp(9%, 13%, 14%); aspect-ratio: 2 / 3; cursor: pointer; transition: all 0.5s ease; transform-style: preserve-3d; filter: drop-shadow(0.5vw 1.2vw 1.4vw rgba(0,0,0,0.85)); overflow: hidden; }
    .magazine:hover { transform: scale(1.4) translateY(-3vw) rotateX(8deg) !important; filter: brightness(1.2) drop-shadow(1.2vw 2.5vw 3.5vw rgba(0,0,0,0.98)); z-index: 999; }
    .magazine img { width: 100%; height: 100%; object-fit: cover; object-position: center; border: 0.4vw solid #0f0b05; border-radius: 0.5vw; box-shadow: inset 0 0 2vw rgba(0,0,0,0.6); }

<script>
    let offset = 0;
    const lamps = document.querySelectorAll('.lamp');
    const scene = document.querySelector('.scene');

    function interpolateColor(c1, c2, factor) {
      const r = Math.round(parseInt(c1.substr(1,2),16) * (1-factor) + parseInt(c2.substr(1,2),16) * factor);
      const g = Math.round(parseInt(c1.substr(3,2),16) * (1-factor) + parseInt(c2.substr(3,2),16) * factor);
      const b = Math.round(parseInt(c1.substr(5,2),16) * (1-factor) + parseInt(c2.substr(5,2),16) * factor);
      return `rgb(${r},${g},${b})`;
    }

    function updateTime() {
      const now = new Date();
      const currentHour = (now.getHours() + offset) % 24;
      const minute = now.getMinutes();
      const totalMinutes = currentHour * 60 + minute;

      let dayProgress = totalMinutes / (24 * 60);

      const sunAngle = (dayProgress * 360 - 90) % 360;
      const heightFactorRaw = Math.sin(sunAngle * Math.PI / 180);
      const heightFactor = Math.abs(heightFactorRaw);

      const posX = 5 + 90 * (0.5 - Math.cos(sunAngle * Math.PI / 180) * 0.5);
      const horizon = 70;
      const maxHeight = 5;
      const posY = horizon - (horizon - maxHeight) * heightFactor;

      const sunElem = document.getElementById('sun');
      const moonElem = document.getElementById('moon');

      if (heightFactorRaw > 0) {
        sunElem.style.left = posX + '%';
        sunElem.style.top = posY + '%';
        sunElem.style.opacity = Math.min(1, heightFactor * 4);
        moonElem.style.opacity = 0;
      } else {
        const moonAngle = sunAngle + 180;
        const moonHeight = Math.abs(Math.sin(moonAngle * Math.PI / 180));
        const moonPosX = 5 + 90 * (0.5 - Math.cos(moonAngle * Math.PI / 180) * 0.5);
        const moonPosY = horizon - (horizon - maxHeight) * moonHeight;
        moonElem.style.left = moonPosX + '%';
        moonElem.style.top = moonPosY + '%';
        moonElem.style.opacity = Math.min(1, moonHeight * 4);
        sunElem.style.opacity = 0;
      }

      let skyColor1, skyColor2;

      if (dayProgress < 0.25) { 
        const t = dayProgress / 0.25;
        skyColor1 = interpolateColor('#0a001f', '#2D0066', t);
        skyColor2 = interpolateColor('#1a0033', '#FF007F', t);
      } else if (dayProgress < 0.3) {
        const t = (dayProgress - 0.25) / 0.05;
        skyColor1 = interpolateColor('#2D0066', '#00E5FF', t);
        skyColor2 = interpolateColor('#FF007F', '#39FF14', t);
      } else if (dayProgress < 0.5) {
          skyColor1 = '#00E5FF';
          skyColor2 = '#39FF14';
      } else if (dayProgress < 0.75) {
          const t = (dayProgress - 0.5) / 0.25;
          skyColor1 = interpolateColor('#00E5FF', '#FF007F', t); 
          skyColor2 = interpolateColor('#39FF14', '#FF4500', t);
      } else if (dayProgress < 0.8) {
        const t = (dayProgress - 0.75) / 0.05;
        skyColor1 = interpolateColor('#FF007F', '#0a001f', t);
        skyColor2 = interpolateColor('#FF4500', '#1a0033', t);
      } else {
        skyColor1 = '#0a001f';
        skyColor2 = '#2D0066';
      }

      scene.style.background = `linear-gradient(to bottom, ${skyColor1} 30%, ${skyColor2} 100%)`;

      document.body.classList.remove('day', 'dusk', 'night');
      if (currentHour >= 7 && currentHour < 18) {
          document.body.classList.add('day');
      } else if (currentHour >= 18 && currentHour < 21) {
          document.body.classList.add('dusk');
      } else {
          document.body.classList.add('night'); 
      }
    }

    function updateClockHands() {
      const now = new Date();
      const hours = (now.getHours() + offset) % 12;
      const minutes = now.getMinutes();

      const minutesDeg = minutes * 6;
      const hoursDeg   = hours * 30 + minutes * 0.5;

      const clock = document.querySelector('.clock');
      if (clock) {
        clock.style.setProperty('--minute-hand', `${minutesDeg}deg`);
        clock.style.setProperty('--hour-hand', `${hoursDeg}deg`);
      }
    }

    lamps.forEach(lamp => {
      lamp.addEventListener('click', () => {
        offset = (offset + 1) % 24;
        updateTime();
        updateClockHands();
      });
    });

    const characters = ['normal', 'mario'];
    const randomChar = characters[Math.floor(Math.random() * characters.length)];
    if(randomChar === 'mario') {
      document.getElementById('kioskero').classList.add('kioskero-mario');
    }

    updateTime();
    updateClockHands();

    setInterval(() => {
      if (offset === 0) {
        updateTime();
        updateClockHands();
      }
    }, 60000);
  </script>
